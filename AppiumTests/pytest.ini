[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_TC*
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
addopts =
    --tb=short
    -v
    --color=yes
    -p no:warnings

markers =
    smoke:      Quick sanity smoke tests
    regression: Full regression suite
    ui:         UI/UX visual tests
    functional: Functional feature tests
    unit:       Unit-level component tests
    validation: Input validation tests
    security:   Security tests
    performance: Performance tests
    auth:       Authentication tests
    payment:    Payment flow tests
    wallet:     Wallet screen tests
    profile:    Profile screen tests
    home:       Home screen tests
    navigation: Navigation tests
    accessibility: Accessibility tests
    merchant:   Merchant role tests
