name: "🧪 Digipay E2E Tests + XLSX Report"

on:
  push:
    branches: ["**"]          # Run on every push to any branch
  pull_request:
    branches: ["**"]          # Run on every PR
  workflow_dispatch:           # Allow manual trigger from GitHub Actions UI

# Wait for deploy-pages to finish before running E2E tests on main pushes
# (on PRs this is skipped since Pages only deploys on main)

jobs:
  e2e-tests:
    name: "Run E2E Tests & Generate Report"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ──────────────────────────────────────────────────────────────
      # 1. Checkout the repository
      # ──────────────────────────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────
      # 2. Set up Python 3.11
      # ──────────────────────────────────────────────────────────────
      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "tests/requirements-test.txt"

      # ──────────────────────────────────────────────────────────────
      # 3. Install Chrome + ChromeDriver
      # ──────────────────────────────────────────────────────────────
      - name: "🌐 Install Chrome Browser"
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: "stable"

      # ──────────────────────────────────────────────────────────────
      # 4. Install Python test dependencies
      # ──────────────────────────────────────────────────────────────
      - name: "📦 Install Test Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      # ──────────────────────────────────────────────────────────────
      # 5. Wait for Railway backend to be ready (handles cold starts)
      # ──────────────────────────────────────────────────────────────
      - name: "⏳ Wait for Railway Backend"
        run: |
          echo "Waiting for backend at https://web-production-86613.up.railway.app ..."
          max_attempts=18
          attempt=0
          until curl --silent --fail --max-time 10 \
                "https://web-production-86613.up.railway.app/" > /dev/null 2>&1; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "⚠️  Backend did not respond after $((max_attempts * 10))s — continuing anyway."
              break
            fi
            echo "  Attempt $attempt/$max_attempts — retrying in 10s..."
            sleep 10
          done
          echo "✅ Backend is reachable."

      # ──────────────────────────────────────────────────────────────
      # 6. Wait for GitHub Pages frontend to be ready
      #    URL: https://harishbalaji826-ops.github.io/digipay-web/
      # ──────────────────────────────────────────────────────────────
      - name: "⏳ Wait for GitHub Pages Frontend"
        run: |
          echo "Waiting for frontend at https://harishbalaji826-ops.github.io/digipay-web/ ..."
          max_attempts=12
          attempt=0
          until curl --silent --fail --max-time 15 \
                "https://harishbalaji826-ops.github.io/digipay-web/" > /dev/null 2>&1; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "⚠️  Frontend did not respond after $((max_attempts * 10))s — continuing anyway."
              break
            fi
            echo "  Attempt $attempt/$max_attempts — retrying in 10s..."
            sleep 10
          done
          echo "✅ Frontend is reachable."

      # ──────────────────────────────────────────────────────────────
      # 7. Run the full E2E test suite
      # ──────────────────────────────────────────────────────────────
      - name: "🧪 Run Digipay E2E Test Suite"
        id: run_tests
        working-directory: tests/e2e
        env:
          PYTHONPATH: "."
          DISPLAY: ":99"
          # Override URLs via env so tests pick them up
          FRONTEND_URL: "https://harishbalaji826-ops.github.io/digipay-web"
          BACKEND_URL:  "https://web-production-86613.up.railway.app"
        run: |
          # Start virtual display for headless Chrome on Linux
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

          echo "Running test suite..."
          pytest \
            test_01_landing.py \
            test_02_login.py \
            test_03_dashboard.py \
            test_04_api_unit.py \
            test_05_security.py \
            --json-report \
            --json-report-file=results.json \
            --json-report-indent=2 \
            -v \
            --tb=short \
            --timeout=60 \
            -p no:warnings \
          || true   # Don't fail this step — report always generates

      # ──────────────────────────────────────────────────────────────
      # 8. Generate the XLSX report
      # ──────────────────────────────────────────────────────────────
      - name: "📊 Generate XLSX Test Report"
        id: generate_report
        working-directory: tests/e2e
        if: always()
        run: |
          if [ ! -f results.json ]; then
            echo "⚠️  results.json not found — creating empty placeholder."
            echo '{"tests":[],"duration":0}' > results.json
          fi

          python report_generator.py \
            --input results.json \
            --output-dir ../../test-reports

          REPORT_FILE=$(ls ../../test-reports/E2E_Test_Report_Digipay_*.xlsx 2>/dev/null | head -1)
          echo "REPORT_PATH=${REPORT_FILE}" >> "$GITHUB_ENV"
          echo "✅ Report generated: ${REPORT_FILE}"

      # ──────────────────────────────────────────────────────────────
      # 9. Post test summary to GitHub Actions Job Summary
      #    Visible directly in the Actions tab — no download needed
      # ──────────────────────────────────────────────────────────────
      - name: "📋 Post Test Summary to GitHub"
        working-directory: tests/e2e
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from collections import defaultdict

          results_path = "results.json"
          if not os.path.exists(results_path):
              print("results.json not found — cannot generate summary.")
              sys.exit(0)

          with open(results_path) as f:
              report = json.load(f)

          tests    = report.get("tests", [])
          total    = len(tests)
          passed   = sum(1 for t in tests if t.get("outcome") == "passed")
          failed   = sum(1 for t in tests if t.get("outcome") == "failed")
          errors   = sum(1 for t in tests if t.get("outcome") == "error")
          skipped  = sum(1 for t in tests if t.get("outcome") == "skipped")
          run_time = report.get("duration", 0)
          pass_rate = (passed / total * 100) if total > 0 else 0

          badge = "✅" if (failed == 0 and total > 0) else "❌"

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "w") as out:
              out.write(f"# {badge} Digipay — E2E Test Report\n\n")
              out.write(f"> **Branch:** `{os.environ.get('GITHUB_REF_NAME','unknown')}` &nbsp;|&nbsp; ")
              out.write(f"**Run:** #{os.environ.get('GITHUB_RUN_NUMBER','?')} &nbsp;|&nbsp; ")
              out.write(f"**Duration:** {run_time:.2f}s &nbsp;|&nbsp; ")
              out.write(f"**Pass Rate:** {pass_rate:.1f}%\n\n")

              # ── KPI table ──────────────────────────────────────────
              out.write("## 📊 Test Run Summary\n\n")
              out.write("| Metric | Value |\n")
              out.write("|--------|-------|\n")
              out.write(f"| 🔢 Total Tests   | **{total}** |\n")
              out.write(f"| ✅ Passed        | **{passed}** |\n")
              out.write(f"| ❌ Failed        | **{failed}** |\n")
              if errors:  out.write(f"| 💥 Errors        | **{errors}** |\n")
              if skipped: out.write(f"| ⏭ Skipped        | **{skipped}** |\n")
              out.write(f"| 📊 Pass Rate     | **{pass_rate:.1f}%** |\n")
              out.write(f"| ⏱ Total Duration | **{run_time:.2f}s** |\n\n")

              # ── Category breakdown ─────────────────────────────────
              categories = defaultdict(lambda: {"passed": 0, "failed": 0, "total": 0})
              for t in tests:
                  node_id = t.get("nodeid", "")
                  lower   = node_id.lower()
                  if   "landing"   in lower: cat = "🏠 Landing Page"
                  elif "login"     in lower: cat = "🔐 Login Portal"
                  elif "dashboard" in lower: cat = "📊 Dashboard Portal"
                  elif "api_unit"  in lower:
                      if   "testbackendhealth"    in lower or "root" in lower: cat = "🟢 API Health"
                      elif "testauthendpoints"    in lower or "auth" in lower: cat = "🔑 Authentication API"
                      elif "testwalletendpoints"  in lower or "wallet" in lower: cat = "💳 Wallet API"
                      elif "testadminendpoints"   in lower or "admin" in lower: cat = "🛡 Admin API"
                      elif "testmerchantendpoints" in lower or "merchant" in lower: cat = "🏪 Merchant API"
                      else: cat = "⚙️ API Tests"
                  elif "security"  in lower: cat = "🔒 Security Tests"
                  else: cat = "📁 General"

                  outcome = t.get("outcome", "unknown")
                  categories[cat]["total"] += 1
                  if outcome == "passed":
                      categories[cat]["passed"] += 1
                  else:
                      categories[cat]["failed"] += 1

              out.write("## 📂 Results by Category\n\n")
              out.write("| Category | Total | ✅ Passed | ❌ Failed | Status |\n")
              out.write("|----------|------:|----------:|----------:|--------|\n")
              for cat, c in sorted(categories.items()):
                  status = "✅ All Pass" if c["failed"] == 0 else f"❌ {c['failed']} Failed"
                  out.write(f"| {cat} | {c['total']} | {c['passed']} | {c['failed']} | {status} |\n")
              out.write("\n")

              # ── Failed tests detail ────────────────────────────────
              failed_tests = [t for t in tests if t.get("outcome") != "passed"]
              if failed_tests:
                  out.write("## ❌ Failed Tests\n\n")
                  out.write("| # | Category | Test Name | Error |\n")
                  out.write("|---|----------|-----------|-------|\n")
                  for i, t in enumerate(failed_tests, 1):
                      node_id = t.get("nodeid", "")
                      name = node_id.split("::")[-1]
                      call = t.get("call", {})
                      longrepr = str(call.get("longrepr", "No details"))
                      # Take first meaningful line
                      first_line = next((ln.strip() for ln in longrepr.split("\n")
                                         if ln.strip() and not ln.strip().startswith("+")), longrepr[:120])
                      first_line = first_line[:120].replace("|", "\\|")
                      # derive category
                      lower = node_id.lower()
                      if   "landing"   in lower: cat = "Landing Page"
                      elif "login"     in lower: cat = "Login"
                      elif "dashboard" in lower: cat = "Dashboard"
                      elif "api_unit"  in lower: cat = "API Unit"
                      elif "security"  in lower: cat = "Security"
                      else: cat = "General"
                      out.write(f"| {i} | {cat} | `{name}` | {first_line} |\n")
                  out.write("\n")
              else:
                  out.write("## 🎉 All Tests Passed!\n\n")
                  out.write("> No failures detected in this run. Great job! 🚀\n\n")

              out.write("---\n")
              out.write("_📁 Download the full `.xlsx` report from the **Artifacts** section below this summary._\n")

          print("✅ GitHub Actions job summary written successfully.")
          PYEOF

      # ──────────────────────────────────────────────────────────────
      # 10. Upload the XLSX report as a downloadable artifact
      # ──────────────────────────────────────────────────────────────
      - name: "📤 Upload XLSX Report Artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "E2E-Test-Report-Digipay-${{ github.run_number }}"
          path: "test-reports/E2E_Test_Report_Digipay_*.xlsx"
          retention-days: 30
          if-no-files-found: warn

      # ──────────────────────────────────────────────────────────────
      # 11. Upload the raw JSON results (useful for debugging)
      # ──────────────────────────────────────────────────────────────
      - name: "📤 Upload Raw JSON Results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "Test-Results-JSON-${{ github.run_number }}"
          path: "tests/e2e/results.json"
          retention-days: 7
          if-no-files-found: warn

      # ──────────────────────────────────────────────────────────────
      # 12. Fail the job if any tests failed (after all reporting done)
      # ──────────────────────────────────────────────────────────────
      - name: "🚦 Check Final Test Results"
        working-directory: tests/e2e
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, sys, os

          results_path = "results.json"
          if not os.path.exists(results_path):
              print("No results.json found — treating as failure.")
              sys.exit(1)

          with open(results_path) as f:
              report = json.load(f)

          tests  = report.get("tests", [])
          failed = sum(1 for t in tests if t.get("outcome") not in ("passed", "skipped"))
          total  = len(tests)
          passed = sum(1 for t in tests if t.get("outcome") == "passed")

          print(f"Final result: {passed}/{total} tests passed, {failed} failed.")
          if failed > 0:
              print(f"❌ {failed} test(s) failed. Download the XLSX artifact for full details.")
              sys.exit(1)
          else:
              print("✅ All tests passed!")
          PYEOF
