name: ⚡ Backend Baseline Load Test

on:
  workflow_dispatch:

jobs:
  load-test:
    name: 🏃 Run Concurrency Load Test (100 VUs / 1 Min)
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install aiohttp openpyxl

      - name: ⚡ Execute Async Load Test
        run: |
          python digipay-Backend/run_load_test.py

      - name: 📤 Upload Load Test Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: Backend-Load-Test-Report
          path: digipay-Backend/reports/Load_Test_Report.xlsx
          retention-days: 14
