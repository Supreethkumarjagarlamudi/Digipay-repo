name: 📱 iOS E2E WebdriverIO Appium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  APPIUM_VERSION: 2.11.5
  XCUITEST_DRIVER: 7.26.4
  NODE_VERSION: 22
  IOS_VERSION: '26.5'
  IOS_DEVICE_NAME: 'iPhone 17'
  APP_BUNDLE_ID: com.supreeth.Digipay
  APPIUM_HOST: http://127.0.0.1
  APPIUM_PORT: 4723

jobs:
  automation-test:
    name: 🏗️ Build App & Run Appium Automation
    runs-on: self-hosted
    
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ⚙️ Validate Xcode Version
        run: |
          echo "✅ Active Xcode Developer Path: $(xcode-select -p)"
          echo "✅ Active Xcode Version: $(xcodebuild -version | head -1)"

      - name: 🔨 Build iOS App (Simulator)
        run: |
          DERIVED_DIR="${{ github.workspace }}/build"
          rm -rf "$DERIVED_DIR"
          mkdir -p "$DERIVED_DIR"
          
          # Find the simulator runtime matching IOS_VERSION, fallback to latest
          SIM_RUNTIME=$(xcrun simctl list runtimes available | grep -i "iOS ${{ env.IOS_VERSION }}" | tail -1 | awk '{print $NF}' | tr -d '()')
          if [ -z "$SIM_RUNTIME" ]; then
            SIM_RUNTIME=$(xcrun simctl list runtimes available | grep -i "iOS" | tail -1 | awk '{print $NF}' | tr -d '()')
          fi
          echo "Using runtime: $SIM_RUNTIME"
          
          xcodebuild build \
            -project Digipay.xcodeproj \
            -scheme Digipay \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DIR" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
          APP_PATH=$(find "$DERIVED_DIR" -name "Digipay.app" | grep -i "iphonesimulator" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: Digipay.app not found after build"
            exit 1
          fi
          echo "APP_PATH=${APP_PATH}" >> $GITHUB_ENV
          echo "✅ App built at: ${APP_PATH}"

      - name: 🟢 Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🚀 Boot iOS Simulator
        run: |
          # Query available runtimes and pick the best matching simulator
          SIM_DEVICE_TYPE="${{ env.IOS_DEVICE_NAME }}"
          SIM_RUNTIME_OS=$(xcrun simctl list runtimes available | grep -i "iOS ${{ env.IOS_VERSION }}" | tail -1 | awk '{print $NF}')
          if [ -z "$SIM_RUNTIME_OS" ]; then
            SIM_RUNTIME_OS=$(xcrun simctl list runtimes available | grep -i "iOS" | tail -1 | awk '{print $NF}')
          fi
          
          echo "Target Simulator: $SIM_DEVICE_TYPE ($SIM_RUNTIME_OS)"
          
          # Delete existing matching simulators to clean up
          xcrun simctl list devices | grep -E "${SIM_DEVICE_TYPE}|Digipay-Sim" | awk -F '[()]' '{print $2}' | xargs -I {} xcrun simctl delete {} 2>/dev/null || true
          
          # Create a fresh new simulator device
          SIM_UDID=$(xcrun simctl create "Digipay-Sim" "$SIM_DEVICE_TYPE" "$SIM_RUNTIME_OS")
          echo "SIMULATOR_UDID=${SIM_UDID}" >> $GITHUB_ENV
          echo "Created simulator UDID: $SIM_UDID"
          
          # Boot the simulator and wait for state booted
          xcrun simctl boot "$SIM_UDID"
          
          # Wait up to 60 seconds for simulator boot
          echo "Waiting for simulator to boot..."
          for i in {1..30}; do
            BOOT_STATE=$(xcrun simctl list devices | grep "$SIM_UDID" | grep -o "Booted" || echo "Offline")
            if [ "$BOOT_STATE" = "Booted" ]; then
              echo "✅ Simulator is Booted!"
              break
            fi
            sleep 2
          done
          
          # Enable hardware keyboard and layout support
          defaults write com.apple.iphonesimulator ConnectHardwareKeyboard -bool false
          
          # Print booted devices
          xcrun simctl list devices | grep "Booted"

      - name: 📦 Install Appium and Drivers
        run: |
          if ! command -v appium &> /dev/null; then
            echo "Appium not found. Installing globally..."
            npm install -g appium@${{ env.APPIUM_VERSION }}
          else
            echo "✅ Appium already installed: $(appium --version)"
          fi
          
          echo "Installing or updating Appium XCUITest driver..."
          appium driver install xcuitest@${{ env.XCUITEST_DRIVER }} || appium driver update xcuitest || true
          
          appium driver list

      - name: 🚀 Launch Appium Server
        run: |
          appium --log-level info --port ${{ env.APPIUM_PORT }} --relaxed-security > appium.log 2>&1 &
          
          # Verify Appium server is responsive
          echo "Waiting for Appium to launch..."
          for i in {1..10}; do
            if curl -s http://127.0.0.1:${{ env.APPIUM_PORT }}/status > /dev/null; then
              echo "✅ Appium server is up and running!"
              break
            fi
            sleep 2
          done

      - name: 📦 Install Package Dependencies
        run: |
          cd mobile-testing/appium
          npm install

      - name: 🚀 Execute Appium WebdriverIO Test Suites
        run: |
          cd mobile-testing/appium
          npm run test || echo "⚠️ Some tests failed, proceeding to report compilation step..."

      - name: 📦 Install Python Report Dependencies
        run: pip3 install openpyxl --quiet

      - name: 📊 Generate Excel Test Report
        if: always()
        run: |
          cd mobile-testing/appium
          python3 scripts/generate_excel_report.py || echo "⚠️ Excel report generation failed, continuing..."

      - name: 📋 Post Test Summary to GitHub Actions
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, re
          from datetime import datetime

          json_path = "mobile-testing/appium/reports/json/test_results.json"
          if not os.path.exists(json_path):
              print("No JSON results found.")
              sys.exit(0)

          with open(json_path) as f:
              tests = json.load(f)

          total   = len(tests)
          passed  = sum(1 for t in tests if t.get("status") == "PASSED")
          failed  = total - passed
          rate_val = (passed / total) if total else 0
          rate_pct = f"{rate_val * 100:.1f}%" if total else "N/A"
          badge   = "✅" if failed == 0 else "❌"

          # Visual pass rate progress bar
          filled_blocks = int(rate_val * 15)
          empty_blocks = 15 - filled_blocks
          progress_bar = "🟩" * filled_blocks + "⬜" * empty_blocks

          # Parse metadata from test names: "TC-SMK-001 [Priority: High, Module: Launch, Feature: App Startup]: Verify..."
          parsed_tests = []
          for t in tests:
              name = t.get("name", "")
              status = t.get("status", "UNKNOWN")
              suite = t.get("suite", "Unknown Suite")
              
              tc_match = re.search(r"(TC-\w+-\d+)", name)
              priority_match = re.search(r"Priority:\s*(\w+)", name)
              module_match = re.search(r"Module:\s*([\w/]+)", name)
              feature_match = re.search(r"Feature:\s*([^,\]]+)", name)
              title_match = re.search(r"\]:\s*(.+)", name)
              
              tc_id = tc_match.group(1) if tc_match else "TC-GEN"
              priority = priority_match.group(1) if priority_match else "Medium"
              module = module_match.group(1) if module_match else "General"
              feature = feature_match.group(1).strip() if feature_match else "General"
              title = title_match.group(1).strip() if title_match else name
              
              parsed_tests.append({
                  "tc_id": tc_id,
                  "suite": suite,
                  "priority": priority,
                  "module": module,
                  "feature": feature,
                  "title": title,
                  "status": status
              })

          # Breakdown by Suite
          suites = {}
          for pt in parsed_tests:
              s = pt["suite"]
              if s not in suites: suites[s] = {"pass": 0, "fail": 0}
              suites[s]["pass" if pt["status"] == "PASSED" else "fail"] += 1

          # Breakdown by Module
          modules = {}
          for pt in parsed_tests:
              m = pt["module"]
              if m not in modules: modules[m] = {"pass": 0, "fail": 0}
              modules[m]["pass" if pt["status"] == "PASSED" else "fail"] += 1

          # Breakdown by Priority
          priorities = {"High": {"pass": 0, "fail": 0}, "Medium": {"pass": 0, "fail": 0}, "Low": {"pass": 0, "fail": 0}}
          for pt in parsed_tests:
              p = pt["priority"]
              if p in priorities:
                  priorities[p]["pass" if pt["status"] == "PASSED" else "fail"] += 1

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "w") as out:
              out.write(f"# {badge} Digipay — iOS End-to-End Automation Report\n\n")
              out.write(f"> **Branch:** `{os.environ.get('GITHUB_REF_NAME','unknown')}` &nbsp;|&nbsp; ")
              out.write(f"**Trigger:** `{os.environ.get('GITHUB_EVENT_NAME','manual')}` &nbsp;|&nbsp; ")
              out.write(f"**Run Number:** #{os.environ.get('GITHUB_RUN_NUMBER','?')} &nbsp;|&nbsp; ")
              out.write(f"**Execution Time:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')} UTC\n\n")
              
              out.write("## 📈 Overall Metrics\n\n")
              out.write(f"**Pass Rate Visual Indicator:**\n`{progress_bar}` **{rate_pct}**\n\n")
              out.write("| Metric | Value |\n|---|---|\n")
              out.write(f"| 🔢 Total Tests | **{total}** |\n")
              out.write(f"| 🟢 Passed | **{passed}** |\n")
              out.write(f"| 🔴 Failed | **{failed}** |\n")
              out.write(f"| 📱 Device Platform | iOS Simulator (iPhone 17) |\n")
              out.write(f"| 🛠️ Engine Driver | Appium + XCUITest Driver |\n\n")

              out.write("## 🎯 Breakdown by Test Priority\n\n")
              out.write("| Priority | Total | Passed | Failed | Pass Rate |\n")
              out.write("|---|---:|---:|---:|---:|\n")
              for p in ["High", "Medium", "Low"]:
                  p_pass = priorities[p]["pass"]
                  p_fail = priorities[p]["fail"]
                  p_total = p_pass + p_fail
                  p_rate = f"{(p_pass/p_total*100):.1f}%" if p_total else "0.0%"
                  out.write(f"| **{p}** | {p_total} | {p_pass} | {p_fail} | {p_rate} |\n")
              out.write("\n")

              out.write("## 📂 Breakdown by Test Suite\n\n")
              out.write("| Suite | Total | Passed | Failed | Status |\n")
              out.write("|---|---:|---:|---:|---|\n")
              for s, data in sorted(suites.items()):
                  s_total = data["pass"] + data["fail"]
                  s_status = "✅ PASS" if data["fail"] == 0 else f"❌ {data['fail']} FAIL"
                  out.write(f"| {s} | {s_total} | {data['pass']} | {data['fail']} | **{s_status}** |\n")
              out.write("\n")

              out.write("## ⚙️ Breakdown by Feature Module\n\n")
              out.write("| Feature Module | Total | Passed | Failed | Pass Rate |\n")
              out.write("|---|---:|---:|---:|---:|\n")
              for m, data in sorted(modules.items()):
                  m_total = data["pass"] + data["fail"]
                  m_rate = f"{(data['pass']/m_total*100):.1f}%" if m_total else "0.0%"
                  out.write(f"| {m} | {m_total} | {data['pass']} | {data['fail']} | {m_rate} |\n")
              out.write("\n")

              if failed == 0:
                  out.write("## 🎉 Verification Status: 100% SUCCESS\n\n")
                  out.write("> All test cases executed successfully. No regressions or integration errors detected in the current build. 🚀\n\n")
              else:
                  out.write("## ❌ Failed Test Cases Catalog\n\n")
                  out.write("| ID | Suite | Module | Feature Area | Description / Fail Reason |\n")
                  out.write("|---|---|---|---|---|\n")
                  for pt in parsed_tests:
                      if pt["status"] != "PASSED":
                          out.write(f"| `{pt['tc_id']}` | {pt['suite']} | {pt['module']} | {pt['feature']} | {pt['title'][:80]} |\n")
                  out.write("\n")

              out.write("---\n_📥 Download the detailed, styled `.xlsx` test workbook from the **Artifacts** panel below._\n")

          print(f"✅ GITHUB_STEP_SUMMARY updated: {total} tests processed.")
          PYEOF

      - name: 📤 Upload Test Reports and Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Digipay-iOS-Test-Report-${{ github.run_number }}
          path: |
            mobile-testing/appium/reports/Digipay_Test_Report.xlsx
            mobile-testing/appium/reports/json/test_results.json
            mobile-testing/appium/reports/screenshots/
            mobile-testing/appium/appium.log
          retention-days: 30
          if-no-files-found: warn
