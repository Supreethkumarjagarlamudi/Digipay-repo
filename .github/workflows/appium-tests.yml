name: 📱 iOS E2E WebdriverIO Appium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  APPIUM_VERSION: 2.11.5
  XCUITEST_DRIVER: 7.26.4
  NODE_VERSION: 22
  IOS_VERSION: '26.5'
  IOS_DEVICE_NAME: 'iPhone 17'
  APP_BUNDLE_ID: com.supreeth.Digipay
  APPIUM_HOST: http://127.0.0.1
  APPIUM_PORT: 4723

jobs:
  automation-test:
    name: 🏗️ Build App & Run Appium Automation
    runs-on: self-hosted
    
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ⚙️ Validate Xcode Version
        run: |
          echo "✅ Active Xcode Developer Path: $(xcode-select -p)"
          echo "✅ Active Xcode Version: $(xcodebuild -version | head -1)"

      - name: 🔨 Build iOS App (Simulator)
        run: |
          DERIVED_DIR="${{ github.workspace }}/build"
          rm -rf "$DERIVED_DIR"
          mkdir -p "$DERIVED_DIR"
          
          # Find the simulator runtime matching IOS_VERSION, fallback to latest
          SIM_RUNTIME=$(xcrun simctl list runtimes available | grep -i "iOS ${{ env.IOS_VERSION }}" | tail -1 | awk '{print $NF}' | tr -d '()')
          if [ -z "$SIM_RUNTIME" ]; then
            SIM_RUNTIME=$(xcrun simctl list runtimes available | grep -i "iOS" | tail -1 | awk '{print $NF}' | tr -d '()')
          fi
          echo "Using runtime: $SIM_RUNTIME"
          
          xcodebuild build \
            -project Digipay.xcodeproj \
            -scheme Digipay \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DIR" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
          APP_PATH=$(find "$DERIVED_DIR" -name "Digipay.app" | grep -i "iphonesimulator" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: Digipay.app not found after build"
            exit 1
          fi
          echo "APP_PATH=${APP_PATH}" >> $GITHUB_ENV
          echo "✅ App built at: ${APP_PATH}"

      - name: 🟢 Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🚀 Boot iOS Simulator
        run: |
          # Query available runtimes and pick the best matching simulator
          SIM_DEVICE_TYPE="${{ env.IOS_DEVICE_NAME }}"
          SIM_RUNTIME_OS=$(xcrun simctl list runtimes available | grep -i "iOS ${{ env.IOS_VERSION }}" | tail -1 | awk '{print $NF}')
          if [ -z "$SIM_RUNTIME_OS" ]; then
            SIM_RUNTIME_OS=$(xcrun simctl list runtimes available | grep -i "iOS" | tail -1 | awk '{print $NF}')
          fi
          
          echo "Target Simulator: $SIM_DEVICE_TYPE ($SIM_RUNTIME_OS)"
          
          # Delete existing matching simulators to clean up
          xcrun simctl list devices | grep -E "${SIM_DEVICE_TYPE}|Digipay-Sim" | awk -F '[()]' '{print $2}' | xargs -I {} xcrun simctl delete {} 2>/dev/null || true
          
          # Create a fresh new simulator device
          SIM_UDID=$(xcrun simctl create "Digipay-Sim" "$SIM_DEVICE_TYPE" "$SIM_RUNTIME_OS")
          echo "SIMULATOR_UDID=${SIM_UDID}" >> $GITHUB_ENV
          echo "Created simulator UDID: $SIM_UDID"
          
          # Boot the simulator and wait for state booted
          xcrun simctl boot "$SIM_UDID"
          
          # Wait up to 60 seconds for simulator boot
          echo "Waiting for simulator to boot..."
          for i in {1..30}; do
            BOOT_STATE=$(xcrun simctl list devices | grep "$SIM_UDID" | grep -o "Booted" || echo "Offline")
            if [ "$BOOT_STATE" = "Booted" ]; then
              echo "✅ Simulator is Booted!"
              break
            fi
            sleep 2
          done
          
          # Enable hardware keyboard and layout support
          defaults write com.apple.iphonesimulator ConnectHardwareKeyboard -bool false
          
          # Print booted devices
          xcrun simctl list devices | grep "Booted"

      - name: 📦 Install Appium and Drivers
        run: |
          if ! command -v appium &> /dev/null; then
            echo "Appium not found. Installing globally..."
            npm install -g appium@${{ env.APPIUM_VERSION }}
          else
            echo "✅ Appium already installed: $(appium --version)"
          fi
          
          echo "Installing or updating Appium XCUITest driver..."
          appium driver install xcuitest@${{ env.XCUITEST_DRIVER }} || appium driver update xcuitest || true
          
          appium driver list

      - name: 🚀 Launch Appium Server
        run: |
          appium --log-level info --port ${{ env.APPIUM_PORT }} --relaxed-security > appium.log 2>&1 &
          
          # Verify Appium server is responsive
          echo "Waiting for Appium to launch..."
          for i in {1..10}; do
            if curl -s http://127.0.0.1:${{ env.APPIUM_PORT }}/status > /dev/null; then
              echo "✅ Appium server is up and running!"
              break
            fi
            sleep 2
          done

      - name: 📦 Install Package Dependencies
        run: |
          cd mobile-testing/appium
          npm install

      - name: 🚀 Execute Appium WebdriverIO Test Suites
        run: |
          cd mobile-testing/appium
          npm run test || echo "⚠️ Some tests failed, proceeding to report compilation step..."

      - name: 📦 Install Python Report Dependencies
        run: pip3 install openpyxl --quiet

      - name: 📊 Generate Excel Test Report
        if: always()
        run: |
          cd mobile-testing/appium
          python3 scripts/generate_excel_report.py || echo "⚠️ Excel report generation failed, continuing..."

      - name: 📋 Post Test Summary to GitHub Actions
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from datetime import datetime

          json_path = "mobile-testing/appium/reports/json/test_results.json"
          if not os.path.exists(json_path):
              print("No JSON results found.")
              sys.exit(0)

          with open(json_path) as f:
              tests = json.load(f)

          total   = len(tests)
          passed  = sum(1 for t in tests if t.get("status") == "PASSED")
          failed  = total - passed
          rate    = f"{passed/total*100:.1f}%" if total else "N/A"
          badge   = "✅" if failed == 0 else "❌"

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "w") as out:
              out.write(f"# {badge} Digipay — iOS Mobile Test Report\n\n")
              out.write(f"> **Branch:** `{os.environ.get('GITHUB_REF_NAME','unknown')}` &nbsp;|&nbsp; ")
              out.write(f"**Run:** #{os.environ.get('GITHUB_RUN_NUMBER','?')} &nbsp;|&nbsp; ")
              out.write(f"**Date:** {datetime.now().strftime('%Y-%m-%d %H:%M')} UTC\n\n")
              out.write("## 📊 Test Execution Summary\n\n")
              out.write("| Metric | Value |\n|--------|-------|\n")
              out.write(f"| 🔢 Total Tests | **{total}** |\n")
              out.write(f"| ✅ Passed      | **{passed}** |\n")
              out.write(f"| ❌ Failed      | **{failed}** |\n")
              out.write(f"| 📊 Pass Rate   | **{rate}** |\n")
              out.write(f"| 📱 Platform    | iOS Simulator |\n")
              out.write(f"| 🛠 Framework   | Appium + WebdriverIO |\n\n")

              # Suite breakdown
              suites = {}
              for t in tests:
                  s = t.get("suite", "Unknown")
                  if s not in suites: suites[s] = {"pass": 0, "fail": 0}
                  suites[s]["pass" if t.get("status") == "PASSED" else "fail"] += 1

              out.write("## 📂 Results by Suite\n\n")
              out.write("| Suite | Total | ✅ Passed | ❌ Failed | Status |\n")
              out.write("|-------|------:|----------:|----------:|--------|\n")
              for suite, data in sorted(suites.items()):
                  st = data["pass"] + data["fail"]
                  status = "✅ PASS" if data["fail"] == 0 else f"❌ {data['fail']} FAIL"
                  out.write(f"| {suite} | {st} | {data['pass']} | {data['fail']} | {status} |\n")
              out.write("\n")

              if failed == 0:
                  out.write("## 🎉 All Tests Passed!\n\n")
                  out.write("> 100% pass rate achieved across all suites. 🚀\n\n")
              else:
                  out.write("## ❌ Failed Tests\n\n")
                  out.write("| Test Case ID | Suite | Description |\n|---|---|---|\n")
                  for t in tests:
                      if t.get("status") != "PASSED":
                          name = t.get("name", "")
                          import re
                          m = re.search(r"(TC-\w+-\d+).*?:\s+(.+)", name)
                          tc_id = m.group(1) if m else "—"
                          desc  = m.group(2)[:80] if m else name[:80]
                          out.write(f"| {tc_id} | {t.get('suite','—')} | {desc} |\n")
                  out.write("\n")

              out.write("---\n_📥 Download the full `.xlsx` report from the **Artifacts** section._\n")

          print(f"✅ Job summary written: {total} tests, {passed} passed, {failed} failed")
          PYEOF

      - name: 📤 Upload Test Reports and Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Digipay-iOS-Test-Report-${{ github.run_number }}
          path: |
            mobile-testing/appium/reports/Digipay_Test_Report.xlsx
            mobile-testing/appium/reports/json/test_results.json
            mobile-testing/appium/reports/screenshots/
            mobile-testing/appium/appium.log
          retention-days: 30
          if-no-files-found: warn
