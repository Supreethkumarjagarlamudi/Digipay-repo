name: 🍎 Digipay iOS — Appium E2E Tests

on:
  push:
    branches: [main, develop, "feature/**"]
    paths:
      - "AppiumTests/**"
      - "Digipay/**"
      - ".github/workflows/appium-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "AppiumTests/**"
      - "Digipay/**"
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Which test suite to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - auth
          - home
          - wallet
          - payment
          - profile
          - navigation
          - validation
          - ui
          - regression
      ios_version:
        description: "iOS Simulator version (e.g. 18.2)"
        required: false
        default: "18.2"
      device_name:
        description: "Simulator device name"
        required: false
        default: "iPhone 16"

# ──────────────────────────────────────────────────────────────────────────────
# Environment defaults
# macOS 15 arm64 runners ship Xcode 16.x and iOS 18.x simulators.
# ──────────────────────────────────────────────────────────────────────────────
env:
  APPIUM_VERSION:  "2.11.5"
  XCUITEST_DRIVER: "7.26.4"
  PYTHON_VERSION:  "3.12"
  NODE_VERSION:    "22"
  # iOS 18.x is the default runtime on macos-15 GitHub-hosted runners
  IOS_VERSION:     ${{ github.event.inputs.ios_version  || '18.2' }}
  IOS_DEVICE_NAME: ${{ github.event.inputs.device_name || 'iPhone 16' }}
  APP_BUNDLE_ID:   "com.supreeth.Digipay"
  APPIUM_HOST:     "http://127.0.0.1"
  APPIUM_PORT:     "4723"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build iOS .app for Simulator
  # ────────────────────────────────────────────────────────────────────────────
  build-app:
    name: 🏗️ Build iOS App (Simulator)
    runs-on: macos-15
    outputs:
      app-path: ${{ steps.build.outputs.app-path }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Detect the installed Xcode 16 path dynamically
      - name: 🔧 Select Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || echo "")
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer||')
            echo "⚠️ No Xcode_16 found, using default: $XCODE_PATH"
          fi
          sudo xcode-select -s "${XCODE_PATH}/Contents/Developer"
          echo "✅ Xcode: $(xcodebuild -version | head -1)"

      - name: 📋 Show available simulators
        run: xcrun simctl list runtimes available

      - name: 📦 Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('Digipay/**/*.swift', 'Digipay.xcodeproj/project.pbxproj') }}
          restore-keys: ${{ runner.os }}-deriveddata-

      - name: 🏗️ Build for Simulator
        id: build
        run: |
          DERIVED_DIR="$HOME/Library/Developer/Xcode/DerivedData"

          # Find the first available iOS simulator runtime
          SIM_RUNTIME=$(xcrun simctl list runtimes available | grep -i "iOS" | tail -1 | awk '{print $NF}' | tr -d '()')
          echo "Using runtime: $SIM_RUNTIME"

          xcodebuild build \
            -project Digipay.xcodeproj \
            -scheme Digipay \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DIR" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

          APP_PATH=$(find "$DERIVED_DIR" -name "Digipay.app" -path "*/iphonesimulator*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: Digipay.app not found after build"
            exit 1
          fi
          echo "app-path=${APP_PATH}" >> "$GITHUB_OUTPUT"
          echo "✅ App built at: ${APP_PATH}"

      - name: 📤 Upload .app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digipay-simulator-app
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/Digipay.app
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Run Appium tests (parallel matrix, one per suite)
  # ────────────────────────────────────────────────────────────────────────────
  appium-tests:
    name: 🧪 Appium — ${{ matrix.suite }}
    runs-on: macos-15
    needs: build-app
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        suite:
          - auth
          - home
          - wallet
          - payment
          - profile
          - navigation
          - validation
          - ui
          - regression

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. Xcode ─────────────────────────────────────────────────────────────
      - name: 🔧 Select Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || echo "")
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer||')
          fi
          sudo xcode-select -s "${XCODE_PATH}/Contents/Developer"
          echo "✅ Xcode: $(xcodebuild -version | head -1)"

      # ── 3. Node.js (no npm cache — no package-lock.json in repo root) ────────
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No 'cache: npm' here — avoids error when package-lock.json is absent

      # ── 4. Appium cache (keyed on version string) ─────────────────────────
      - name: 📦 Restore Appium cache
        id: appium-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            /usr/local/lib/node_modules/appium
          key: ${{ runner.os }}-appium-${{ env.APPIUM_VERSION }}-xcuitest-${{ env.XCUITEST_DRIVER }}-node${{ env.NODE_VERSION }}
          restore-keys: ${{ runner.os }}-appium-

      # ── 5. Install Appium + driver ────────────────────────────────────────
      - name: 📲 Install Appium + XCUITest driver
        run: |
          npm install -g appium@${{ env.APPIUM_VERSION }}
          appium driver install xcuitest@${{ env.XCUITEST_DRIVER }}
          echo "✅ Appium $(appium --version) ready"

      # ── 6. Python ─────────────────────────────────────────────────────────
      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: AppiumTests/requirements.txt

      - name: 📦 Install Python test dependencies
        working-directory: AppiumTests
        run: pip install -r requirements.txt

      # ── 7. Simulator ──────────────────────────────────────────────────────
      - name: 📱 Boot iOS Simulator
        run: |
          echo "=== Available Runtimes ==="
          xcrun simctl list runtimes available

          echo "=== Available Devices ==="
          xcrun simctl list devices available | grep -i "iphone" | head -20

          # Try to find a matching device (name + version)
          UDID=$(xcrun simctl list devices available \
            | grep "${{ env.IOS_DEVICE_NAME }}" \
            | grep "(${{ env.IOS_VERSION }})" \
            | head -1 \
            | grep -oE '\([A-F0-9-]{36}\)' \
            | tr -d '()')

          # Fallback: use any iPhone 16 (or 15) available
          if [ -z "$UDID" ]; then
            echo "⚠️ ${{ env.IOS_DEVICE_NAME }} ${{ env.IOS_VERSION }} not found, trying iPhone 16..."
            UDID=$(xcrun simctl list devices available \
              | grep "iPhone 16" \
              | grep -v "Plus\|Pro\|Max" \
              | head -1 \
              | grep -oE '\([A-F0-9-]{36}\)' \
              | tr -d '()')
          fi

          # Fallback: any available iPhone
          if [ -z "$UDID" ]; then
            echo "⚠️ iPhone 16 not found, using first available iPhone..."
            UDID=$(xcrun simctl list devices available \
              | grep "iPhone" \
              | head -1 \
              | grep -oE '\([A-F0-9-]{36}\)' \
              | tr -d '()')
          fi

          if [ -z "$UDID" ]; then
            echo "❌ No iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi

          # Get device name for capabilities
          DEVICE_NAME=$(xcrun simctl list devices available | grep "$UDID" | sed 's/ (.*//' | xargs)
          # Get iOS version for capabilities
          IOS_VER=$(xcrun simctl list devices available | grep -B5 "$UDID" | grep "iOS" | tail -1 | grep -oE '[0-9]+\.[0-9]+')

          echo "SIMULATOR_UDID=${UDID}"   >> "$GITHUB_ENV"
          echo "ACTUAL_DEVICE=${DEVICE_NAME}" >> "$GITHUB_ENV"
          echo "ACTUAL_IOS_VER=${IOS_VER:-18.2}" >> "$GITHUB_ENV"

          xcrun simctl boot "$UDID" 2>/dev/null || true
          # Wait until booted
          for i in $(seq 1 30); do
            STATE=$(xcrun simctl list devices | grep "$UDID" | grep -o "Booted" || echo "")
            if [ "$STATE" = "Booted" ]; then
              echo "✅ Simulator booted: $DEVICE_NAME ($UDID)"
              break
            fi
            sleep 2
          done

      # ── 8. Download built .app ────────────────────────────────────────────
      - name: 📥 Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: digipay-simulator-app
          path: /tmp/digipay-app

      - name: 📲 Install app on Simulator
        run: |
          APP_PATH=$(find /tmp/digipay-app -name "Digipay.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Digipay.app not found in artifact"
            ls -la /tmp/digipay-app/
            exit 1
          fi
          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"
          xcrun simctl install "${{ env.SIMULATOR_UDID }}" "$APP_PATH"
          echo "✅ App installed: $APP_PATH"

      # ── 9. Start Appium Server ────────────────────────────────────────────
      - name: 🚀 Start Appium Server
        run: |
          appium \
            --port "${{ env.APPIUM_PORT }}" \
            --log /tmp/appium_${{ matrix.suite }}.log \
            --log-level info \
            --relaxed-security &
          APPIUM_PID=$!
          echo "APPIUM_PID=${APPIUM_PID}" >> "$GITHUB_ENV"

          # Wait until Appium is ready
          for i in $(seq 1 20); do
            if curl -sf "http://127.0.0.1:${{ env.APPIUM_PORT }}/status" > /dev/null 2>&1; then
              echo "✅ Appium ready (PID: ${APPIUM_PID})"
              break
            fi
            sleep 2
          done

      # ── 10. Run Tests ─────────────────────────────────────────────────────
      - name: 🧪 Run ${{ matrix.suite }} tests
        working-directory: AppiumTests
        env:
          IOS_VERSION:     ${{ env.ACTUAL_IOS_VER }}
          IOS_DEVICE_NAME: ${{ env.ACTUAL_DEVICE }}
          APP_BUNDLE_ID:   ${{ env.APP_BUNDLE_ID }}
          APP_PATH:        ${{ env.APP_PATH }}
          APPIUM_HOST:     ${{ env.APPIUM_HOST }}
          APPIUM_PORT:     ${{ env.APPIUM_PORT }}
          SIMULATOR_UDID:  ${{ env.SIMULATOR_UDID }}
        run: |
          mkdir -p reports/screenshots

          SUITE="${{ matrix.suite }}"
          if [ "$SUITE" = "all" ]; then
            TEST_PATH="tests/"
          else
            TEST_PATH="tests/${SUITE}/"
          fi

          echo "🧪 Running suite: ${SUITE} (${TEST_PATH})"

          # Run pytest — exit code captured via PIPESTATUS (tee must not hide failures)
          python -m pytest "$TEST_PATH" \
            -v \
            --tb=short \
            --color=yes \
            -p no:warnings \
            2>&1 | tee "reports/pytest_${SUITE}.log"

          PYTEST_EXIT=${PIPESTATUS[0]}
          echo "pytest exit code: $PYTEST_EXIT"
          exit $PYTEST_EXIT

      # ── 11. Stop Appium (always) ──────────────────────────────────────────
      - name: ⛔ Stop Appium Server
        if: always()
        run: |
          if [ -n "${{ env.APPIUM_PID }}" ]; then
            kill "${{ env.APPIUM_PID }}" 2>/dev/null && echo "✅ Appium stopped" || echo "ℹ️ Appium already stopped"
          else
            # Fallback: kill by port
            lsof -ti tcp:${{ env.APPIUM_PORT }} | xargs kill -9 2>/dev/null || true
          fi

      # ── 12. Upload Reports ────────────────────────────────────────────────
      - name: 📊 Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-report-${{ matrix.suite }}
          path: AppiumTests/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: 📋 Upload Appium server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-server-log-${{ matrix.suite }}
          path: /tmp/appium_${{ matrix.suite }}.log
          if-no-files-found: warn
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Merge all reports and publish Excel summary
  # ────────────────────────────────────────────────────────────────────────────
  merge-reports:
    name: 📊 Merge & Publish Final Excel Report
    runs-on: macos-15
    needs: appium-tests
    if: always()

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install openpyxl
        run: pip install openpyxl

      - name: 📥 Download all test report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: appium-report-*
          merge-multiple: true
          path: all-reports/

      - name: 📊 Generate merged Excel summary
        run: |
          python << 'EOF'
          import os, glob, openpyxl, datetime
          from openpyxl.styles import Font, PatternFill, Alignment, Border, Side

          BLUE  = "1E40AF"
          GREEN = "16A34A"
          RED   = "DC2626"
          GRAY  = "F1F5F9"
          WHITE = "FFFFFF"
          DARK  = "1E293B"

          thin = Side(border_style="thin", color="CBD5E1")
          border = Border(left=thin, right=thin, top=thin, bottom=thin)

          wb = openpyxl.Workbook()
          ws = wb.active
          ws.title = "CI Summary"
          ws.sheet_view.showGridLines = False

          # Title banner
          ws.merge_cells("A1:E1")
          ws["A1"].value = f"DIGIPAY Appium CI Report — {datetime.datetime.now().strftime('%Y-%m-%d %H:%M UTC')}"
          ws["A1"].font = Font(name="Calibri", size=16, bold=True, color=WHITE)
          ws["A1"].fill = PatternFill("solid", fgColor=BLUE)
          ws["A1"].alignment = Alignment(horizontal="center", vertical="center")
          ws.row_dimensions[1].height = 32

          # Headers
          headers = ["Suite", "Log File", "Pass", "Fail", "Status"]
          widths  = [14, 45, 8, 8, 10]
          for col, (h, w) in enumerate(zip(headers, widths), 1):
              cell = ws.cell(row=2, column=col, value=h)
              cell.font = Font(name="Calibri", bold=True, color=WHITE)
              cell.fill = PatternFill("solid", fgColor=DARK)
              cell.alignment = Alignment(horizontal="center", vertical="center")
              cell.border = border
              ws.column_dimensions[openpyxl.utils.get_column_letter(col)].width = w

          logs = glob.glob("all-reports/**/pytest_*.log", recursive=True) + \
                 glob.glob("all-reports/pytest_*.log")
          logs = sorted(set(logs))

          for i, log_path in enumerate(logs, 1):
              suite = os.path.basename(log_path).replace("pytest_", "").replace(".log", "")
              try:
                  with open(log_path) as f:
                      content = f.read()
              except Exception:
                  content = ""

              import re
              # Parse pytest summary line e.g. "5 passed, 2 failed"
              m = re.search(r'(\d+) passed', content)
              passed = int(m.group(1)) if m else 0
              m = re.search(r'(\d+) failed', content)
              failed = int(m.group(1)) if m else 0

              status = "PASS" if failed == 0 and passed > 0 else ("FAIL" if failed > 0 else "NO DATA")
              status_color = GREEN if status == "PASS" else (RED if status == "FAIL" else "6B7280")

              row = i + 2
              vals = [suite, log_path, passed, failed, status]
              for col, val in enumerate(vals, 1):
                  cell = ws.cell(row=row, column=col, value=val)
                  cell.border = border
                  cell.alignment = Alignment(horizontal="center", vertical="center")
                  cell.font = Font(name="Calibri", size=10)
                  if col == 5:
                      cell.font = Font(name="Calibri", size=10, bold=True, color=WHITE)
                      cell.fill = PatternFill("solid", fgColor=status_color)
                  elif row % 2 == 0:
                      cell.fill = PatternFill("solid", fgColor="F8FAFC")

          ts = datetime.datetime.now().strftime("%Y%m%d_%H%M%S")
          out = f"Digipay_CI_Appium_Summary_{ts}.xlsx"
          wb.save(out)
          print(f"✅ Summary report: {out}")
          EOF

      - name: 📤 Upload merged Excel report
        uses: actions/upload-artifact@v4
        with:
          name: digipay-appium-FINAL-excel-report
          path: "Digipay_CI_Appium_Summary_*.xlsx"
          if-no-files-found: warn
          retention-days: 90

      # ── Job summary table ──────────────────────────────────────────────────
      - name: 📝 Write GitHub Step Summary
        if: always()
        run: |
          echo "## 🍎 Digipay Appium E2E Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for log in all-reports/pytest_*.log; do
            suite=$(basename "$log" | sed 's/pytest_//' | sed 's/.log//')
            if grep -q "failed" "$log" 2>/dev/null; then
              status="❌ FAIL"
            elif grep -q "passed" "$log" 2>/dev/null; then
              status="✅ PASS"
            else
              status="⚠️ NO DATA"
            fi
            echo "| $suite | $status |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📊 Full Excel report available in **Actions → Artifacts**" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Post PR comment with test summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let summary = '## 🍎 Digipay Appium E2E Test Summary\n\n';
            summary += '| Suite | Status |\n|-------|--------|\n';

            const dir = 'all-reports';
            if (fs.existsSync(dir)) {
              const logs = fs.readdirSync(dir).filter(f => f.startsWith('pytest_') && f.endsWith('.log'));
              for (const log of logs.sort()) {
                const content = fs.readFileSync(path.join(dir, log), 'utf8');
                const suite = log.replace('pytest_', '').replace('.log', '');
                const status = content.includes(' failed') ? '❌ FAIL' : '✅ PASS';
                summary += `| ${suite} | ${status} |\n`;
              }
            } else {
              summary += '| All suites | ⚠️ No report data available |\n';
            }

            summary += '\n> 📊 Excel report available in **Actions → Artifacts → digipay-appium-FINAL-excel-report**';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
