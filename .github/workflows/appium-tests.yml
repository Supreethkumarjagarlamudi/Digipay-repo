name: Digipay iOS Appium E2E Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  automation-test:
    runs-on: self-hosted
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: automation/package.json

      - name: Install dependencies
        run: |
          cd automation
          npm ci

      - name: Install Appium & XCUITest Driver
        run: |
          npm install -g appium@latest --force || echo "Using existing Appium version"
          appium driver list --installed | grep -q xcuitest || appium driver install xcuitest@7.24.0

      - name: Build iOS Application (Xcode)
        run: |
          xcodebuild -project Digipay.xcodeproj -scheme Digipay -sdk iphonesimulator -destination "platform=iOS Simulator,name=iPhone 17" clean build

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 17" || true
          xcrun simctl bootstatus "iPhone 17" || true

      - name: Start Appium Server
        run: |
          appium --log reports/logs/appium.log &
          sleep 5

      - name: Run WebdriverIO Appium Tests
        run: |
          cd automation
          npm run test
        env:
          NODE_ENV: staging

      - name: Generate Reports
        if: always()
        run: |
          cd automation
          npm run report
          npm run allure:generate

      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Testing-Reports
          path: |
            automation/reports/excel/
            automation/reports/html/
            automation/reports/logs/
            automation/reports/screenshots/
