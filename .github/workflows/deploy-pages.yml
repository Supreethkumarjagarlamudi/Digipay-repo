name: "🚀 Deploy Digipay Web to GitHub Pages"

on:
  push:
    branches: ["main"]
    paths:
      - "digipay-Web/**"        # Only redeploy when web app changes
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:            # Allow manual trigger

# Allow this workflow to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: "Build Vite App & Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ──────────────────────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────
      # 2. Setup Node.js (LTS)
      # ──────────────────────────────────────────────────────────────
      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "digipay-Web/package-lock.json"

      # ──────────────────────────────────────────────────────────────
      # 3. Install npm dependencies
      # ──────────────────────────────────────────────────────────────
      - name: "📦 Install npm Dependencies"
        working-directory: digipay-Web
        run: npm ci

      # ──────────────────────────────────────────────────────────────
      # 4. Build the Vite app
      #    VITE_BACKEND_URL is set so the production build points
      #    to the live Railway backend.
      # ──────────────────────────────────────────────────────────────
      - name: "🏗️ Build Vite App"
        working-directory: digipay-Web
        env:
          VITE_BACKEND_URL: "https://web-production-86613.up.railway.app"
        run: npm run build

      # ──────────────────────────────────────────────────────────────
      # 5. Setup GitHub Pages
      # ──────────────────────────────────────────────────────────────
      - name: "⚙️ Setup GitHub Pages"
        uses: actions/configure-pages@v4

      # ──────────────────────────────────────────────────────────────
      # 6. Upload built dist/ as Pages artifact
      # ──────────────────────────────────────────────────────────────
      - name: "📤 Upload Pages Artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: "digipay-Web/dist"

      # ──────────────────────────────────────────────────────────────
      # 7. Deploy to GitHub Pages
      # ──────────────────────────────────────────────────────────────
      - name: "🚀 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
